<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ MBTI 人格测试 ✨</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes slideBar {
  from { width: 0%; }
}
@keyframes sparkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}
@keyframes bounceIn {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.1); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); opacity: 1; }
}

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #fce4ec, #e1bee7, #b3e5fc, #c8e6c9, #fff9c4, #fce4ec);
  background-size: 600% 600%;
  animation: gradientBG 20s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow-x: hidden;
}

.container {
  width: 100%;
  max-width: 680px;
}

.card {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 48px 40px;
  box-shadow: 0 8px 32px rgba(180, 140, 200, 0.25), 0 2px 8px rgba(0,0,0,0.06);
  border: 1px solid rgba(255,255,255,0.6);
  animation: fadeIn 0.6s ease;
}

/* ========== Welcome Page ========== */
.welcome-emoji {
  font-size: 72px;
  text-align: center;
  animation: float 3s ease-in-out infinite;
  margin-bottom: 16px;
}
.welcome-title {
  font-size: 36px;
  font-weight: 800;
  text-align: center;
  background: linear-gradient(135deg, #e91e90, #9c27b0, #2196f3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}
.welcome-sub {
  text-align: center;
  color: #7b6b8a;
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 32px;
}
.welcome-tags {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 36px;
}
.tag {
  background: linear-gradient(135deg, #f8bbd0, #e1bee7);
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  color: #6a3d7d;
  font-weight: 600;
}

.btn-primary {
  display: block;
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #f06292, #ba68c8, #7986cb);
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 16px rgba(186, 104, 200, 0.35);
  letter-spacing: 1px;
}
.btn-primary:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 6px 24px rgba(186, 104, 200, 0.5);
}
.btn-primary:active {
  transform: translateY(0) scale(0.98);
}

/* ========== Progress Bar ========== */
.progress-section {
  margin-bottom: 32px;
}
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.progress-label {
  font-size: 14px;
  font-weight: 600;
  color: #8e6aad;
}
.progress-bar {
  height: 10px;
  background: #f0e6f6;
  border-radius: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #f06292, #ba68c8, #7986cb);
  border-radius: 10px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  animation: slideBar 0.5s ease;
}

/* ========== Question Page ========== */
.question-category {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: 0.5px;
}
.cat-ei { background: #fce4ec; color: #c2185b; }
.cat-sn { background: #e8f5e9; color: #388e3c; }
.cat-tf { background: #e3f2fd; color: #1565c0; }
.cat-jp { background: #fff3e0; color: #e65100; }

.question-text {
  font-size: 19px;
  font-weight: 700;
  color: #3d2d52;
  line-height: 1.7;
  margin-bottom: 28px;
  min-height: 52px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.option-card {
  background: rgba(255,255,255,0.9);
  border: 2px solid #ede4f7;
  border-radius: 18px;
  padding: 18px 22px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
}
.option-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(240,98,146,0.05), rgba(186,104,200,0.08));
  opacity: 0;
  transition: opacity 0.3s;
}
.option-card:hover {
  border-color: #ce93d8;
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(186,104,200,0.2);
}
.option-card:hover::before { opacity: 1; }
.option-card:active {
  transform: translateY(0) scale(0.98);
}
.option-card.selected {
  border-color: #ab47bc;
  background: linear-gradient(135deg, rgba(240,98,146,0.08), rgba(186,104,200,0.12));
  box-shadow: 0 4px 16px rgba(171,71,188,0.2);
}
.option-letter {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f8bbd0, #e1bee7);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 15px;
  color: #7b3d8a;
  flex-shrink: 0;
  transition: all 0.3s;
}
.option-card.selected .option-letter {
  background: linear-gradient(135deg, #f06292, #ba68c8);
  color: white;
}
.option-text {
  font-size: 15px;
  color: #4a3660;
  line-height: 1.5;
  font-weight: 500;
  position: relative;
  z-index: 1;
}

/* ========== Loading Page ========== */
.loading-container {
  text-align: center;
  padding: 40px 0;
}
.loading-spinner {
  font-size: 56px;
  animation: spin 2s linear infinite;
  margin-bottom: 24px;
}
.loading-text {
  font-size: 18px;
  color: #7b6b8a;
  font-weight: 600;
  margin-bottom: 8px;
}
.loading-sub {
  font-size: 14px;
  color: #a896b8;
}
.loading-dots::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

/* ========== Result Page ========== */
.result-container {
  text-align: center;
}
.result-emoji {
  font-size: 80px;
  animation: bounceIn 0.8s ease;
  margin-bottom: 8px;
}
.result-type {
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(135deg, #e91e90, #9c27b0, #2196f3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
  animation: bounceIn 0.8s ease 0.2s both;
}
.result-name {
  font-size: 22px;
  font-weight: 700;
  color: #5a3d73;
  margin-bottom: 12px;
  animation: bounceIn 0.8s ease 0.35s both;
}
.result-desc {
  font-size: 15px;
  color: #7b6b8a;
  line-height: 1.8;
  margin-bottom: 28px;
  animation: bounceIn 0.8s ease 0.5s both;
}
.result-tags {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 32px;
  animation: bounceIn 0.8s ease 0.6s both;
}
.result-tag {
  padding: 5px 14px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 600;
}
.tag-a { background: #fce4ec; color: #c2185b; }
.tag-b { background: #e8f5e9; color: #388e3c; }
.tag-c { background: #e3f2fd; color: #1565c0; }
.tag-d { background: #fff3e0; color: #e65100; }
.tag-e { background: #f3e5f5; color: #7b1fa2; }

.bar-chart {
  margin-bottom: 32px;
  animation: bounceIn 0.8s ease 0.7s both;
}
.bar-row {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
  gap: 10px;
}
.bar-label {
  width: 80px;
  text-align: right;
  font-size: 14px;
  font-weight: 700;
  color: #5a3d73;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  height: 22px;
  background: #f0e6f6;
  border-radius: 11px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 11px;
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.bar-fill.ei { background: linear-gradient(90deg, #f48fb1, #ec407a); }
.bar-fill.sn { background: linear-gradient(90deg, #a5d6a7, #66bb6a); }
.bar-fill.tf { background: linear-gradient(90deg, #90caf9, #42a5f5); }
.bar-fill.jp { background: linear-gradient(90deg, #ffcc80, #ffa726); }
.bar-value {
  width: 52px;
  font-size: 13px;
  font-weight: 700;
  color: #7b6b8a;
  flex-shrink: 0;
}

.btn-secondary {
  display: inline-block;
  padding: 14px 40px;
  font-size: 16px;
  font-weight: 700;
  color: #7b3d8a;
  background: linear-gradient(135deg, #f8bbd0, #e1bee7);
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 3px 12px rgba(186,104,200,0.2);
  animation: bounceIn 0.8s ease 0.85s both;
}
.btn-secondary:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(186,104,200,0.35);
}

.hidden { display: none !important; }

/* ========== Sparkles ========== */
.sparkle-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: -1;
  overflow: hidden;
}
.sparkle {
  position: absolute;
  font-size: 20px;
  animation: sparkle 3s ease-in-out infinite;
}
</style>
</head>
<body>

<div class="sparkle-bg" id="sparkleBg"></div>

<div class="container">
  <!-- Welcome Page -->
  <div class="card" id="page-welcome">
    <div class="welcome-emoji">🔮</div>
    <h1 class="welcome-title">MBTI 人格测试</h1>
    <p class="welcome-sub">
      20道精选趣味题目<br>
      发现隐藏的你 ✨ 测测你是哪种人格类型？
    </p>
    <div class="welcome-tags">
      <span class="tag">🎯 20道题</span>
      <span class="tag">⏱ 约5分钟</span>
      <span class="tag">💝 16种人格</span>
      <span class="tag">🌟 超准确</span>
    </div>
    <button class="btn-primary" onclick="startQuiz()">🚀 开始探索自我</button>
  </div>

  <!-- Question Page -->
  <div class="card hidden" id="page-question">
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label" id="progressLabel">第 1 题 / 共 20 题</span>
        <span class="progress-label" id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>
    <div id="categoryBadge"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
  </div>

  <!-- Loading Page -->
  <div class="card hidden" id="page-loading">
    <div class="loading-container">
      <div class="loading-spinner">🧠</div>
      <div class="loading-text">正在分析你的性格...</div>
      <div class="loading-sub">别急，好结果值得等待<span class="loading-dots"></span></div>
    </div>
  </div>

  <!-- Result Page -->
  <div class="card hidden" id="page-result">
    <div class="result-container">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-type" id="resultType"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="result-tags" id="resultTags"></div>
      <div class="bar-chart" id="barChart"></div>
      <button class="btn-secondary" onclick="restartQuiz()">🔄 再测一次</button>
    </div>
  </div>
</div>

];

// ===== 16 Personality Types =====

// ===== State =====
let currentQ = 0;
let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

// ===== Sparkles Background =====
function createSparkles() {
  const bg = document.getElementById('sparkleBg');
  const emojis = ['✨', '⭐', '💫', '🌟', '💖', '🌸', '🦋'];
  for (let i = 0; i < 15; i++) {
    const s = document.createElement('span');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.fontSize = (14 + Math.random() * 16) + 'px';
    bg.appendChild(s);
  }
}
createSparkles();

// ===== Navigation =====
function showPage(id) {
  document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
  const page = document.getElementById('page-' + id);
  page.classList.remove('hidden');
  page.style.animation = 'none';
  page.offsetHeight; // reflow
  page.style.animation = 'fadeIn 0.6s ease';
}

// ===== Start Quiz =====
function startQuiz() {
  currentQ = 0;
  scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  showPage('question');
  renderQuestion();
}

// ===== Render Question =====
function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;

  // Progress
  const pct = Math.round((currentQ / total) * 100);
  document.getElementById('progressLabel').textContent = `第 ${currentQ + 1} 题 / 共 ${total} 题`;
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // Category badge
  document.getElementById('categoryBadge').innerHTML =
    `<span class="question-category ${q.catClass}">${q.catLabel}</span>`;

  // Question text
  document.getElementById('questionText').textContent = q.text;

  // Options
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = ['A', 'B'];
  q.options.forEach((opt, i) => {
    const card = document.createElement('div');
    card.className = 'option-card';
    card.innerHTML = `
      <span class="option-letter">${letters[i]}</span>
      <span class="option-text">${opt.text}</span>
    `;
    card.addEventListener('click', () => selectOption(card, opt.score));
    container.appendChild(card);
  });
}

// ===== Select Option =====
function selectOption(card, score) {
  document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');

  scores[score]++;

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showLoading();
    }
  }, 350);
}

// ===== Loading =====
function showLoading() {
  showPage('loading');
  const messages = [
    '正在分析你的性格...',
    '读取你的潜意识...',
    '匹配人格类型...',
    '即将揭晓答案...'
  ];
  let msgIdx = 0;
  const textEl = document.querySelector('.loading-text');
  const subEl = document.querySelector('.loading-sub');
  const interval = setInterval(() => {
    msgIdx = (msgIdx + 1) % messages.length;
    textEl.textContent = messages[msgIdx];
    subEl.innerHTML = '别急，好结果值得等待<span class="loading-dots"></span>';
  }, 800);

  setTimeout(() => {
    clearInterval(interval);
    showResult();
  }, 3200);
}

// ===== Show Result =====
function showResult() {
  const type = getResultType();
  const info = personalityTypes[type];

  // Calculate percentages
  const eiTotal = scores.E + scores.I;
  const snTotal = scores.S + scores.N;
  const tfTotal = scores.T + scores.F;
  const jpTotal = scores.J + scores.P;

  const eiPct = eiTotal > 0 ? Math.round((Math.max(scores.E, scores.I) / eiTotal) * 100) : 50;
  const snPct = snTotal > 0 ? Math.round((Math.max(scores.S, scores.N) / snTotal) * 100) : 50;
  const tfPct = tfTotal > 0 ? Math.round((Math.max(scores.T, scores.F) / tfTotal) * 100) : 50;
  const jpPct = jpTotal > 0 ? Math.round((Math.max(scores.J, scores.P) / jpTotal) * 100) : 50;

  // Fill result
  document.getElementById('resultEmoji').textContent = info.emoji;
  document.getElementById('resultType').textContent = type;
  document.getElementById('resultName').textContent = info.name;
  document.getElementById('resultDesc').textContent = info.desc;

  // Tags
  const tagsEl = document.getElementById('resultTags');
  tagsEl.innerHTML = '';
  const tagClasses = ['tag-a', 'tag-b', 'tag-c', 'tag-d', 'tag-e'];
  info.tags.forEach((tag, i) => {
    const el = document.createElement('span');
    el.className = 'result-tag ' + tagClasses[i % tagClasses.length];
    el.textContent = tag;
    tagsEl.appendChild(el);
  });

  // Bar chart
  const chartEl = document.getElementById('barChart');
  chartEl.innerHTML = '';
  const barData = [
    { label: getDimensionLabel('E', 'I'), left: scores.E, right: scores.I, pct: eiPct, cls: 'ei', leftLetter: 'E', rightLetter: 'I' },
    { label: getDimensionLabel('S', 'N'), left: scores.S, right: scores.N, pct: snPct, cls: 'sn', leftLetter: 'S', rightLetter: 'N' },
    { label: getDimensionLabel('T', 'F'), left: scores.T, right: scores.F, pct: tfPct, cls: 'tf', leftLetter: 'T', rightLetter: 'F' },
    { label: getDimensionLabel('J', 'P'), left: scores.J, right: scores.P, pct: jpPct, cls: 'jp', leftLetter: 'J', rightLetter: 'P' }
  ];

  barData.forEach((bar, idx) => {
    const row = document.createElement('div');
    row.className = 'bar-row';
    const dominant = bar.left >= bar.right ? bar.leftLetter : bar.rightLetter;
    const dominantPct = bar.pct;
    const recessivePct = 100 - bar.pct;
    const fillWidth = bar.left >= bar.right ? dominantPct : recessivePct;
    const fillPos = bar.left >= bar.right ? (100 - dominantPct) : 0;

    row.innerHTML = `
      <span class="bar-label">${dominant} ${dominantPct}%</span>
      <div class="bar-track">
        <div class="bar-fill ${bar.cls}" style="width: ${fillWidth}%; margin-left: ${fillPos}%;"></div>
      </div>
      <span class="bar-value">${bar.leftLetter} ${bar.left}/${bar.right} ${bar.rightLetter}</span>
    `;
    chartEl.appendChild(row);
  });

  showPage('result');

  // Animate bars after page shown
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => {
      const w = bar.style.width;
      const ml = bar.style.marginLeft;
      bar.style.width = '0%';
      bar.style.marginLeft = '0%';
      setTimeout(() => {
        bar.style.width = w;
        bar.style.marginLeft = ml;
      }, 100);
    });
  }, 800);
}

function getDimensionLabel(left, right) {
  const map = { 'EI': '外向↔内向', 'SN': '实感↔直觉', 'TF': '思考↔感受', 'JP': '判断↔感知' };
  const key = [left, right].sort().join('');
  return map[key] || '';
}

function getResultType() {
  let type = '';
  type += scores.E >= scores.I ? 'E' : 'I';
  type += scores.S >= scores.N ? 'S' : 'N';
  type += scores.T >= scores.F ? 'T' : 'F';
  type += scores.J >= scores.P ? 'J' : 'P';
  return type;
}

// ===== Restart =====
function restartQuiz() {
  showPage('welcome');
}
